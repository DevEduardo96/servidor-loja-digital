<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/admin.js"></script>
  </head>
  <body class="bg-gray-100 min-h-screen p-6">
    <h1 class="text-3xl font-bold mb-6">Painel Administrativo</h1>
    <div id="tabela-pagamentos" class="overflow-x-auto"></div>
    <h2 class="text-xl font-bold mt-10 mb-2">Adicionar Produto</h2>
    <form id="form-produto" class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <input
        type="text"
        id="nome"
        placeholder="Nome do produto"
        class="p-2 border rounded"
        required
      />
      <input
        type="number"
        step="0.01"
        id="preco"
        placeholder="Preço"
        class="p-2 border rounded"
        required
      />
      <input
        type="text"
        id="linkDownload"
        placeholder="Link de download"
        class="p-2 border rounded"
        required
      />
      <button
        type="submit"
        class="md:col-span-3 bg-blue-600 text-white p-2 rounded"
      >
        Salvar Produto
      </button>
    </form>

    <h2 class="text-xl font-bold mt-10 mb-2">Lista de Produtos</h2>
    <div id="lista-produtos" class="overflow-x-auto"></div>
  </body>
</html>
